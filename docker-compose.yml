version: "3.8"

services:
  # =============================================
  # Nginx Reverse Proxy + Let's Encrypt
  # =============================================
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - ./docker/proxy.conf:/etc/nginx/conf.d/proxy.conf:ro
    networks:
      - web

  # =============================================
  # Let's Encrypt Companion (auto SSL)
  # =============================================
  acme-companion:
    image: nginxproxy/acme-companion:latest
    container_name: acme-companion
    restart: always
    depends_on:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs:rw
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=admin@howokiman.com
      - NGINX_PROXY_CONTAINER=nginx-proxy
    networks:
      - web

  # =============================================
  # Laravel App (PHP-FPM + Nginx)
  # =============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carhub-app
    restart: always
    depends_on:
      - db
      - redis
    volumes:
      - app-storage:/var/www/html/storage/app/public
    environment:
      - VIRTUAL_HOST=howokiman.com,www.howokiman.com
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=howokiman.com,www.howokiman.com
      - LETSENCRYPT_EMAIL=admin@howokiman.com
    env_file:
      - .env
    networks:
      - web
      - internal

  # =============================================
  # MySQL Database
  # =============================================
  db:
    image: mysql:8.0
    container_name: carhub-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret_root}
      MYSQL_DATABASE: ${DB_DATABASE:-carhub}
      MYSQL_USER: ${DB_USERNAME:-carhub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - internal

volumes:
  db-data:
  app-storage:
  certs:
  vhost:
  html:
  acme:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
